name: Build manylinx wheels and deploy

permissions:
  contents: write

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build Wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------------------------------------------------------------
          # PyTorch 2.11.0 + CUDA 13.0 — H200 (sm_90) + B300 (sm_100)
          # ---------------------------------------------------------------
          - torch-version: "2.11.0"
            python-version: "3.11"
            cuda-version: "13.0.0"
            arch: "9.0;10.0"
            cibw-build: "cp311-*64"
            cibw-build-image: "pytorch/manylinux2_28-builder:cuda13.0-main"
            cibw-build-cuda-version: "13.0"
            cibw-build-torch-cuda-version: "130"
            cibw-build-cuda-compat-version: "13-0"

          - torch-version: "2.11.0"
            python-version: "3.12"
            cuda-version: "13.0.0"
            arch: "9.0;10.0"
            cibw-build: "cp312-*64"
            cibw-build-image: "pytorch/manylinux2_28-builder:cuda13.0-main"
            cibw-build-cuda-version: "13.0"
            cibw-build-torch-cuda-version: "130"
            cibw-build-cuda-compat-version: "13-0"

          - torch-version: "2.11.0"
            python-version: "3.13"
            cuda-version: "13.0.0"
            arch: "9.0;10.0"
            cibw-build: "cp313-*64"
            cibw-build-image: "pytorch/manylinux2_28-builder:cuda13.0-main"
            cibw-build-cuda-version: "13.0"
            cibw-build-torch-cuda-version: "130"
            cibw-build-cuda-compat-version: "13-0"

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Apex
        uses: actions/checkout@v4
        with:
          repository: NVIDIA/apex
          submodules: recursive
          ref: master

      - name: Checkout utils
        uses: actions/checkout@v4
        with:
          path: build_scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cibuildwheel<3.0"

      - name: Build wheels for Pytorch ${{ matrix.torch-version }} + CUDA ${{
          matrix.cibw-build-torch-cuda-version }}
        run: |
          python3 -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.cibw-build-image }}
          CIBW_BEFORE_BUILD_LINUX: >
            sed -i "s/version=\"0.1\"/version=\"0.1+2025.09_torch${{
            matrix.torch-version }}_cu${{ matrix.cibw-build-torch-cuda-version
            }}\"/g" /project/setup.py && sed -i -E
            's/check_cuda_torch_binary_vs_bare_metal\(CUDA_HOME\)/pass/g'
            /project/setup.py && python -m pip install -U pip setuptools wheel
            packaging auditwheel-symbols ninja cmake numpy pybind11 && python -m
            pip install --no-cache-dir torch==${{ matrix.torch-version }}
            --index-url https://download.pytorch.org/whl/cu${{
            matrix.cibw-build-torch-cuda-version }}

          CIBW_ENVIRONMENT: >
            CUDA_HOME="/usr/local/cuda" CUDACXX="/usr/local/cuda/bin/nvcc"
            CFLAGS="-I/usr/include" LDFLAGS="-L/usr/lib"
            AUDITWHEEL_PLAT="manylinux_2_28_$(uname -m)"
            TORCH_CUDA_ARCH_LIST="${{ matrix.arch }}" MAX_JOBS=1 APEX_CPP_EXT=1
            APEX_CUDA_EXT=1 APEX_FAST_MULTIHEAD_ATTN=1

          CIBW_SKIP: "*musllinux*"
          CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w
            /tmp/cibuildwheel/repaired_wheel {wheel} --exclude libc10.so
            --exclude libc10* --exclude libtorch.so --exclude libtorch*
            --exclude libcu* --exclude libnccl*"

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./dist/${{env.wheel_name}}
